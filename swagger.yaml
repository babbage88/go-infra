consumes:
    - application/json
produces:
    - application/json
schemes:
    - http
    - https
swagger: "2.0"
info:
    contact:
        email: test@trahan.dev
        name: Justin Trahan
    description: Documentation of our awesome API.
    license:
        name: N/A
    termsOfService: there are no TOS at this moment, use at your own risk we take no responsibility
    title: awesome.
    version: 1.0.0
host: 10.0.0.64:8993
basePath: /
paths:
    /create/user:
        post:
            operationId: idOfcreateUserEndpoint
            parameters:
                - in: body
                  name: body
                  schema:
                    $ref: '#/definitions/CreateNewUserRequest'
                  x-go-name: Body
            responses:
                "200":
                    $ref: '#/responses/UserDao'
            security:
                - bearer: []
            summary: Create a new user.
            tags:
                - createuser
    /foobar:
        post:
            operationId: idOfFoobarEndpoint
            parameters:
                - description: This text will appear as description of your request body.
                  in: body
                  name: Body
                  schema:
                    $ref: '#/definitions/FooBarRequest'
            responses:
                "200":
                    $ref: '#/responses/foobarResponse'
            summary: Foobar does some amazing stuff.
            tags:
                - foobar-tag
    /login:
        post:
            operationId: idOfloginEndpoint
            parameters:
                - in: body
                  name: body
                  schema:
                    $ref: '#/definitions/UserLoginRequest'
                  x-go-name: Body
            responses:
                "200":
                    $ref: '#/responses/AuthToken'
            summary: Login a user and return token.
            tags:
                - login
    /renew:
        post:
            description: Request/Renew ssl certificate via cloudflare letsencrypt. Uses DNS Challenge
            operationId: idOfrenewEndpoint
            parameters:
                - in: body
                  name: body
                  schema:
                    $ref: '#/definitions/CertDnsRenewReq'
                  x-go-name: Body
            produces:
                - application/json
                - application/zip
            responses:
                "200":
                    $ref: '#/responses/CertificateData'
            tags:
                - renew
    /token/refresh:
        post:
            operationId: idOftokenRefreshEndpoint
            responses:
                "200":
                    $ref: '#/responses/AuthToken'
            summary: Refresh accessTokens andreturn to client.
            tags:
                - tokenRefresh
definitions:
    CertDnsRenewReq:
        properties:
            domainName:
                type: string
                x-go-name: DomainName
            email:
                type: string
                x-go-name: Email
            provider:
                type: string
                x-go-name: Provider
            zipFiles:
                type: boolean
                x-go-name: ZipFiles
        type: object
        x-go-package: github.com/babbage88/go-infra/webutils/cert_renew
    CreateNewUserRequest:
        properties:
            newEmail:
                type: string
                x-go-name: NewUserEmail
            newPassword:
                type: string
                x-go-name: NewUserPassword
            newUserRole:
                type: string
                x-go-name: NewUserRole
            newUsername:
                type: string
                x-go-name: NewUsername
        type: object
        x-go-package: github.com/babbage88/go-infra/webapi/user_api_handlers
    FooBarRequest:
        properties:
            bar:
                items:
                    format: int64
                    type: integer
                type: array
                x-go-name: Bar
            foo:
                type: string
                x-go-name: Foo
        title: FooBarRequest represents body of FooBar request.
        type: object
        x-go-package: github.com/pdrum/swagger-automation/api
    FooBarResponse:
        properties:
            baz:
                properties:
                    prop:
                        type: string
                        x-go-name: Prop
                type: object
                x-go-name: Baz
        title: FooBarResponse represents body of FooBar response.
        type: object
        x-go-package: github.com/pdrum/swagger-automation/api
    UserLoginRequest:
        properties:
            password:
                type: string
                x-go-name: Password
            username:
                type: string
                x-go-name: UserName
        type: object
        x-go-package: github.com/babbage88/go-infra/webapi/authapi
responses:
    AuthToken:
        description: Respose will return login result and the user info.
        headers:
            expiration:
                format: date-time
                type: string
            refreshToken:
                type: string
            token:
                type: string
    CertificateData:
        description: Renew will return CertificateData result and the user info.
        headers:
            ZipDir:
                type: string
            cert_pem:
                type: string
            chain_pem:
                type: string
            fullchain_and_key:
                type: string
            fullchain_pem:
                type: string
            priv_key:
                type: string
    UserDao:
        description: Respose will return login result and the user info.
        headers:
            created_at:
                format: date-time
                type: string
            email:
                type: string
            enabled:
                type: boolean
            is_deleted:
                type: boolean
            last_modified:
                format: date-time
                type: string
            role:
                type: string
            username:
                type: string
    foobarResponse:
        description: This text will appear as description of your response body.
        schema:
            $ref: '#/definitions/FooBarResponse'
securityDefinitions:
    basic:
        type: basic
